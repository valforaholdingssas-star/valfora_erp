# Seeds ERP — stack producción (imagen inmutable, sin montar código fuente).
# Requisitos: .env con SECRET_KEY, ALLOWED_HOSTS, CORS, POSTGRES_*, VITE_* públicos.
#
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d --build
#
# Primera vez: migraciones y collectstatic vía web (el comando ya incluye migrate en dev;
# aquí ejecuta una vez: docker compose -f docker-compose.production.yml run --rm web python manage.py collectstatic --noinput)

name: seeds_erp_prod

services:
  db:
    image: pgvector/pgvector:pg15-bookworm
    container_name: seeds_erp_prod_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seeds_erp}
      POSTGRES_USER: ${POSTGRES_USER:-seeds_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seeds_user} -d ${POSTGRES_DB:-seeds_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seeds_erp_prod_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    container_name: seeds_erp_prod_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_DEBUG: "False"
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    container_name: seeds_erp_prod_celery
    restart: unless-stopped
    command: python -m celery -A config worker -l INFO --concurrency=2
    volumes:
      - media_volume:/app/media
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_DEBUG: "False"
      POSTGRES_HOST: db
      REDIS_CACHE_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    container_name: seeds_erp_prod_beat
    restart: unless-stopped
    command: python -m celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_DEBUG: "False"
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-ws://127.0.0.1/ws}
    container_name: seeds_erp_prod_frontend
    restart: unless-stopped
    depends_on:
      - web

  nginx:
    image: nginx:1.25-alpine
    container_name: seeds_erp_prod_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
      - frontend

volumes:
  postgres_data:
  static_volume:
  media_volume:
