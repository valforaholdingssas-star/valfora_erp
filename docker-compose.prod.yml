# Override sobre docker-compose.yml (settings production + nginx.prod).
# Para despliegue inmutable (sin montar código), usa en su lugar:
#   docker compose -f docker-compose.production.yml up -d --build
# Ver docs/DEPLOYMENT.md
#
# Uso legacy: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Quita el volumen de código en web/celery descomentando los overrides de volumes abajo si despliegas imagen inmutable.

services:
  web:
    # volumes:
    #   - static_volume:/app/staticfiles
    #   - media_volume:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_DEBUG: "False"

  celery_worker:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  celery_beat:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  flower:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  nginx:
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
