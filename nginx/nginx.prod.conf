upstream django_asgi {
    server web:8000;
}

upstream spa_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name erp.valfora.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.valfora.com;

    ssl_certificate /etc/letsencrypt/live/erp.valfora.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.valfora.com/privkey.pem;

    # Chat attachments: backend validates up to 100MB for documents.
    # Keep Nginx limit above app limit to avoid 413 at proxy layer.
    client_max_body_size 110M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:;" always;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
    }

    location /media/ {
        alias /app/media/;
    }

    location /api/ {
        proxy_pass http://django_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://django_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://spa_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
