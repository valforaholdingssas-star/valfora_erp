# Producción: TLS suele terminarse en balanceador o en este Nginx (certificados en volumen).
# Ajusta server_name y descomenta el bloque :443 cuando montes certificados.

upstream django_asgi {
    server web:8000;
}

upstream spa_frontend {
    server frontend:80;
}

# Redirige HTTP → HTTPS cuando uses el bloque :443 (descomenta return en :80)
# o deja solo :80 detrás de un LB que ya haga TLS.

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    # Ajusta si cargas scripts externos (analytics, etc.)
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:; upgrade-insecure-requests" always;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
    }

    location /media/ {
        alias /app/media/;
    }

    location /api/ {
        proxy_pass http://django_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://django_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://django_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://spa_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Ejemplo HTTPS (monta certificados en el contenedor nginx, p. ej. /etc/nginx/certs):
