server {
    listen 80;
    server_name erp.valforaholdings.com erp.valfora.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.valforaholdings.com erp.valfora.com;

    # Resolve Docker service names dynamically to avoid stale upstream IPs
    # after container recreation (prevents intermittent 502).
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    set $django_asgi http://web:8000;
    set $spa_frontend http://frontend:80;

    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/erp.valfora.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.valfora.com/privkey.pem;

    # Chat attachments: backend validates up to 100MB for documents.
    # Keep Nginx limit above app limit to avoid 413 at proxy layer.
    client_max_body_size 110M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:;" always;

    # Block access to hidden files and VCS/secrets paths.
    location ~ (^|/)\.(?!well-known/) {
        deny all;
        return 404;
    }

    location ~* /(.*)(?:\.env|\.ini|\.log|\.bak|\.old|\.swp|\.git|\.gitignore|\.gitmodules)$ {
        deny all;
        return 404;
    }

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
    }

    location /media/ {
        alias /app/media/;
    }

    location /api/ {
        proxy_pass $django_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass $django_asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass $django_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        # WebSocket auth token travels in query string; do not log full request line.
        access_log off;
    }

    location / {
        proxy_pass $spa_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
